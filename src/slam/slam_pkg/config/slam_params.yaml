slam_node:
  ros__parameters:
    # Camera topics
    image_topic: "/camera/color/image_raw"
    depth_topic: "/camera/depth/image_raw"
    camera_info_topic: "/camera/camera_info"

    # SLAM parameters
    update_rate: 10.0  # Hz
    map_resolution: 0.05  # meters per cell
    map_size_x: 20.0  # meters
    map_size_y: 20.0  # meters

    # Feature detection
    max_features: 1000
    feature_type: "ORB"  # ORB, SIFT, etc.

path_planner_node:
  ros__parameters:
    planning_rate: 5.0  # Hz
    goal_tolerance: 0.2  # meters
    max_linear_velocity: 0.5  # m/s
    max_angular_velocity: 0.5  # rad/s
